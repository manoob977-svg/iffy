<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Sale | Iffy Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/shop.css">
</head>

<body class="light-mode">
    <!-- Simple Header -->
    <header class="main-header glass-header"
        style="border-bottom: 1px solid var(--border-color); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;">
        <div class="header-container"
            style="height: var(--header-height); max-width: var(--max-width); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <h1>Iffy<span>.</span></h1>
                </a>
            </div>
            <div class="header-right" style="display: flex; align-items: center; gap: 1rem;">
                <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                    <i class="ph ph-moon"></i>
                </button>
                <div class="header-link">
                    <a href="index.html" class="btn-primary"
                        style="color: white; text-decoration: none; display: flex; align-items: center; gap: 0.25rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 8px;">
                        <i class="ph ph-arrow-left"></i> Back to Main Page
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content" style="margin-top: calc(var(--header-height) + 2rem); min-height: 80vh;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div
                style="display: inline-block; background-color: var(--brand-secondary); color: white; padding: 0.5rem 1.5rem; border-radius: var(--radius-full); font-weight: 800; font-size: 1.2rem; margin-bottom: 1rem; animation: pulse 2s infinite;">
                <i class="ph-fill ph-lightning"></i> LIVE SALE ENDS SOON <i class="ph-fill ph-lightning"></i>
            </div>
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Flash Sale Event</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Incredible discounts on premium items! Grab them
                before they're gone.</p>
        </div>

        <section class="products-section">
            <div class="product-grid" id="flash-grid">
                <!-- Injected via script -->
            </div>
        </section>
    </main>

    <footer class="main-footer"
        style="text-align: center; padding: 2rem; border-top: 1px solid var(--border-color); color: var(--text-secondary);">
        <p>&copy; 2026 Iffy Marketplace. All Rights Reserved.</p>
    </footer>

    <!-- Theme JS and custom grid injector -->
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get 4 random products that have an original price (are on sale)
            const saleProducts = [...globalProducts].filter(p => p.originalPrice).sort(() => 0.5 - Math.random()).slice(0, 4);

            const grid = document.getElementById('flash-grid');
            saleProducts.forEach(item => {
                const formatPrice = `Rs. ${item.price.toLocaleString('en-PK')}`;
                const formatOrig = `Rs. ${item.originalPrice.toLocaleString('en-PK')}`;

                const cardHTML = `
                    <div class="product-card" style="border: 2px solid var(--brand-secondary);">
                        <div class="product-image-container">
                            <span class="badge" style="background-color: var(--brand-secondary); color: white;">SALE</span>
                            <a href="product.html?id=${item.id}" style="display: block; width: 100%; height: 100%;">
                                <img src="${item.imgPrimary}" alt="${item.name}" class="product-image primary-img" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease;">
                            </a>
                            <div class="product-actions" style="bottom: 1rem; right: 1rem; position: absolute;">
                                <button class="action-btn btn-add-cart" onclick="alert('Item added to cart!');" aria-label="Add to cart">
                                    <i class="ph ph-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div class="product-info">
                            <a href="product.html?id=${item.id}" style="text-decoration: none; color: inherit;">
                                <h3 class="product-title" style="margin-top: 1rem;">${item.name}</h3>
                            </a>
                            <div class="product-price" style="margin-top: 0.5rem;">
                                <span style="font-weight: 600;">${formatPrice}</span> 
                                <span style="text-decoration: line-through; color: var(--text-secondary); font-size: 0.85rem; margin-left: 0.5rem; font-weight:400;">${formatOrig}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        });
    </script>
</body>

</html>
