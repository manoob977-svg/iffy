<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just For You | Iffy Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/shop.css">
</head>

<body class="light-mode">
    <!-- Simple Header -->
    <header class="main-header glass-header"
        style="border-bottom: 1px solid var(--border-color); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;">
        <div class="header-container"
            style="height: var(--header-height); max-width: var(--max-width); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <h1>Iffy<span>.</span></h1>
                </a>
            </div>
            <div class="header-right" style="display: flex; align-items: center; gap: 1rem;">
                <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                    <i class="ph ph-moon"></i>
                </button>
                <div class="header-link">
                    <a href="index.html" class="btn-primary"
                        style="color: white; text-decoration: none; display: flex; align-items: center; gap: 0.25rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 8px;">
                        <i class="ph ph-arrow-left"></i> Back to Main Page
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content" style="margin-top: calc(var(--header-height) + 2rem); min-height: 80vh;">
        <div style="text-align: center; margin-bottom: 3rem;">
            <h1
                style="font-size: 2.5rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <i class="ph-fill ph-sparkle" style="color: var(--brand-secondary);"></i> Just For You
            </h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Curated recommendations based on your unique
                style.</p>
        </div>

        <section class="products-section">
            <div class="product-grid" id="jfy-grid">
                <!-- Injected via script -->
            </div>
        </section>
    </main>

    <footer class="main-footer"
        style="text-align: center; padding: 2rem; border-top: 1px solid var(--border-color); color: var(--text-secondary);">
        <p>&copy; 2026 Iffy Marketplace. All Rights Reserved.</p>
    </footer>

    <!-- Theme JS and custom grid injector -->
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get 6 random products from the global data.js array
            const randomProducts = [...globalProducts].sort(() => 0.5 - Math.random()).slice(0, 6);

            const grid = document.getElementById('jfy-grid');
            randomProducts.forEach(item => {
                const formatPrice = `Rs. ${item.price.toLocaleString('en-PK')}`;

                const cardHTML = `
                    <div class="product-card">
                        <div class="product-image-container">
                            <a href="product.html?id=${item.id}" style="display: block; width: 100%; height: 100%;">
                                <img src="${item.imgPrimary}" alt="${item.name}" class="product-image primary-img" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease;">
                            </a>
                            <div class="product-actions" style="bottom: 1rem; right: 1rem; position: absolute;">
                                <button class="action-btn btn-add-cart" onclick="alert('Item added to cart!');" aria-label="Add to cart">
                                    <i class="ph ph-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div class="product-info">
                            <a href="product.html?id=${item.id}" style="text-decoration: none; color: inherit;">
                                <h3 class="product-title" style="margin-top: 1rem;">${item.name}</h3>
                            </a>
                            <div class="product-price" style="margin-top: 0.5rem; font-weight: 600;">${formatPrice}</div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        });
    </script>
</body>

</html>
